# GoReleaser configuration for vault-tpm-helper
version: 2

project_name: vault-tpm-helper

before:
  hooks:
    # Clean up any existing builds
    - go mod tidy
    - go mod download

builds:
  - id: vault-tpm-helper
    main: ./
    binary: vault-tpm-helper
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    # TPM functionality is Linux-specific
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
      - -X main.builtBy=goreleaser
    tags:
      - netgo
      - osusergo

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_Linux_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - README.md
      - CLAUDE.md
      - instructions.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - Merge pull request
      - Merge branch
  groups:
    - title: 'New Features'
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: 'Bug Fixes'
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: 'Security Updates'
      regexp: "^.*sec[(\\w)]*:+.*$"
      order: 2
    - title: 'Performance Improvements'
      regexp: "^.*perf[(\\w)]*:+.*$"
      order: 3
    - title: 'Other Changes'
      order: 999

release:
  # GitHub repository
  github:
    owner: "{{ .Env.GITHUB_USER }}"
    name: "{{ .ProjectName }}"
  
  # Release name template
  name_template: "v{{ .Version }}"
  
  # Mark as prerelease if version contains alpha, beta, or rc
  prerelease: auto
  
  # Release notes
  header: |
    ## vault-tpm-helper {{ .Tag }}
    
    This release provides TPM-backed certificate authentication for HashiCorp Vault.
    
    ### Installation
    
    Download the appropriate binary for your platform from the assets below.
    
    ### Requirements
    
    - Linux system with TPM 2.0 hardware
    - TPM 2.0 software stack installed
    - OpenSSL with TPM2 provider support
    
  footer: |
    **Full Changelog**: https://github.com/{{ .Env.GITHUB_USER }}/{{ .ProjectName }}/compare/{{ .PreviousTag }}...{{ .Tag }}
    
    ---
    
    ### Security Notes
    
    - Always verify checksums before using binaries
    - Use proper Certificate Authorities for signing certificates
    - TPM-backed keys provide hardware-level security

# Disable Docker builds (not applicable for TPM-specific tool)
dockers: []

# Disable Homebrew (Linux-only tool)
brews: []

# Disable Snapcraft (not applicable)
snapcrafts: []

# Disable other package managers (Linux-specific tool)
nfpms: []